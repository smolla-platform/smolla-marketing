name: CI

on:
    push:
        branches: ['**']
    pull_request:
        branches: [main, develop]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: test
        runs-on: [self-hosted, smolla-marketing]

        defaults:
            run:
                working-directory: ${{ github.workspace }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Show toolchain
              run: |
                  node --version
                  npm --version

            - name: Install (frontend)
              run: npm install
              working-directory: frontend

            - name: Type-check (frontend)
              run: npm run type-check
              working-directory: frontend

            - name: Build (frontend)
              run: npm run build
              working-directory: frontend
